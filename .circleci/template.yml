# This is the configuration executed in a new workflow once the main thread starts processing
# a new job on CircleCI.
#
# To modify commands to execute on CI review this file, and the script that generates it.
version: 2.1

orbs:
  browser-tools: circleci/browser-tools@2.4.0
  codecov: codecov/codecov@6.0.0

# List of parameters are automatically inherited from `config.yml`.
parameters:

commands:
  prepare_environment_command:
    description: "Prepare environment (browsers, fonts, etc.)"
    steps:
      - browser-tools/install_chrome:
          chrome_version: << pipeline.parameters.chromeVersion >>
          use_cache: true
          timeout: 5m
      - run:
          name: Install newest emoji to enable emoji picker testing
          command: |
            sudo apt-get update
            sudo apt install fonts-noto-color-emoji

  install_ssh_keys_command:
    description: "Install SSH keys"
    steps:
      - add_ssh_keys:
          fingerprints:
            - "a0:41:a2:56:c8:7d:3f:29:41:d1:87:92:fd:50:2b:6b"

  bootstrap_repository_command:
    description: "Bootstrap the CKEditor 5 project"
    steps:
      - install_ssh_keys_command
      - run:
          name: Disable Corepack
          command: sudo corepack disable
      - run:
          name: Install pnpm
          command: sudo npm i -g pnpm@^11
      - restore_cache:
          name: Restore pnpm store cache
          keys:
            - pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          environment:
            PUPPETEER_SKIP_DOWNLOAD: true
          command: pnpm install --frozen-lockfile --prefer-offline --store-dir ~/.pnpm-store
      - save_cache:
          name: Save pnpm store cache
          key: pnpm-store-v1-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
            - ~/.cache/pnpm/lockfile-verified.jsonl

  checkout_command:
    description: "Clone the CKEditor 5 repository with limited depth and branches"
    steps:
      - run:
          name: Add GitHub to known_hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Checkout code (single branch)
          command: git clone --single-branch --depth 10 --branch "$CIRCLE_BRANCH" "$CIRCLE_REPOSITORY_URL" .

jobs:
  cke5_manual:
    docker:
      - image: cimg/node:24.11.0-browsers
    resource_class: large
    steps:
      - checkout_command
      - bootstrap_repository_command
      - prepare_environment_command
      - run:
          name: Verify CKEditor 5 manual tests
          command: |
            export PUPPETEER_EXECUTABLE_PATH="$(command -v google-chrome)"
            pnpm run manual:verify

  cke5_validators:
    docker:
      - image: cimg/node:24.11.0
    resource_class: medium
    steps:
      - checkout_command
      - bootstrap_repository_command
      - run:
          when: always
          name: Execute tests for internal scripts
          command: pnpm run test:scripts
      - run:
          when: always
          name: Validate versions of CKEditor 5 dependencies
          command: pnpm run check-dependencies:versions-match
      - run:
          when: always
          name: Validate "ckeditor5-metadata.json" files
          command: node scripts/ci/validate-metadata-files.mjs
      - run:
          when: always
          name: Check if all SVG files are optimized
          command: pnpm run clean-up-svg-icons --verify-only
      - run:
          when: always
          name: Validate manual test directories
          command: node scripts/ci/check-manual-tests-directory-structure.mjs
      - run:
          when: always
          name: Validate license files
          command: pnpm run validate-license-files --verbose
      - run:
          when: always
          name: Execute ESLint
          command: pnpm run lint
      - run:
          when: always
          name: Check if all packages are exported in the "ckeditor5" package
          command: pnpm run check-exports
      - run:
          when: always
          name: Check if all package stylesheets are imported in the "theme/index.css" entry points
          command: pnpm run check-css-imports
      - run:
          when: always
          name: Check if all package members are exported correctly from the index.ts file
          command: pnpm run validate-module-re-exports

  release_prepare:
    docker:
      - image: cimg/node:24.11.0
    resource_class: large
    steps:
      - checkout_command
      - bootstrap_repository_command
      - run:
          name: Check if packages are ready to be released
          command: pnpm run release:prepare-packages --compile-only --verbose
      - run:
          name: Lint generated packages
          command: pnpm run release:lint-packages
      - run:
          name: Check dependencies
          command: pnpm run check-dependencies

  cke5_coverage:
    docker:
      - image: cimg/node:24.11.0
    resource_class: small
    steps:
      - checkout_command
      - attach_workspace:
          at: .out
      - run:
          name: Merge the code coverage of the test batches
          command: cat .out/combined_tests_batch_n.info > .out/combined_lcov.info
      - codecov/upload:
          files: .out/combined_lcov.info

workflows:
  version: 2
  main:
    jobs:
      # The `tests_batch_n` placeholder is expanded into the batch jobs generated
      # by `scripts/ci/generate-circleci-configuration.mjs`.
      - tests_batch_n
      - cke5_coverage:
          requires:
            - tests_batch_n
      - cke5_validators
      - cke5_manual
      - release_prepare
