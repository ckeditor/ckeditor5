packages:
  - packages/*

ignoreWorkspaceCycles: true

linkWorkspacePackages: true

minimumReleaseAge: 4320

minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - umberto

onlyBuiltDependencies:
  - '@ckeditor/ckeditor5-dev-build-tools'
  - '@ckeditor/ckeditor5-dev-tests'
  - '@ckeditor/ckeditor5-dev-utils'
  - '@ckeditor/ckeditor5-mermaid'
  - '@parcel/watcher'
  - '@swc/core'
  - core-js
  - esbuild
  - hexo-util
  - puppeteer
  - sharp

overrides:
  '@ckeditor/ckeditor5-dev-build-tools': github:ckeditor/ckeditor5-dev#ci/4266-replace-postcss-with-lightningcss&path:/packages/ckeditor5-dev-build-tools
  '@ckeditor/ckeditor5-dev-utils': github:ckeditor/ckeditor5-dev#ci/4266-replace-postcss-with-lightningcss&path:/packages/ckeditor5-dev-utils
  '@ckeditor/jsdoc-plugins>jsdoc': '-'
  '@iktakahiro/markdown-it-katex>katex': ^0.16.0
  diff@<8: ^8.0.3
  lodash-es: ^4.17.23
  markdown-it-toc: npm:@maboloshi/markdown-it-toc@1.1.1
  minimatch@^9: ^9.0.6
  qs@^6.0.0: ^6.14.2

preferFrozenLockfile: true

shamefullyHoist: true

shellEmulator: true
