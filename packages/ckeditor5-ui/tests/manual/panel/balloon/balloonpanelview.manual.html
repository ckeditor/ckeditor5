<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Balloonpanelview</title>
		<script type="module" src="./balloonpanelview.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<h2><code>BalloonPanelView</code> and <code>defaultPositions</code></h2>
			<ol>
				<li>A number of colorful rectangles should be displayed in the page.</li>
				<li>Each rectangle should have a panel attached.</li>
				<li>Make sure the description in each panel matches the location of the panel.</li>
			</ol>
		</ck-manual-header>

		<div id="container"></div>

		<style>
			#container {
				padding: 5em;
			}

			h1 {
				font-size: 22px;
				text-align: center;
				margin: 70px 0;
			}

			.target {
				width: 125px;
				height: 20px;
				background: lightblue;
				transform: translateX(-50%);
				margin-left: 50%;
			}

			.target + .target {
				margin-top: 70px;
			}

			.ck-balloon-panel {
				padding: 0.3em;
				width: 250px;
				text-align: center;
			}
		</style>
	</body>
</html>
