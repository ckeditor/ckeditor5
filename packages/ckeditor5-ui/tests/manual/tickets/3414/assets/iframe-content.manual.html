<!doctype html>
<head>
	<meta charset="utf-8" />
	<title>Iframe Content</title>
	<meta
		http-equiv="Content-Security-Policy"
		content="style-src * 'unsafe-inline'; script-src * 'unsafe-inline'"
	/>
	<script type="module" src="./iframe-content.ts"></script>
</head>
<div class="container h-100">
	<div class="row h-100 justify-content-center align-items-center">
		<div
			class="modal fade"
			id="modal"
			tabindex="-1"
			role="dialog"
			aria-labelledby="modal"
			aria-hidden="true"
		>
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						A Bootstrap 4 modal with the BalloonEditor instance
						<button type="button" class="close" data-dismiss="modal" aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body">
						<div id="editor">
							<p>Content of <a href="https://ckeditor.com">the editor</a>.</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div id="info">
		There is nothing to do here as it is just a sub-component of another test.
		<br />
		<a href="../1.manual.html">Click here to continue testing</a>.
	</div>

	<link
		rel="stylesheet"
		href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
	/>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
	<script src="https://unpkg.com/popper.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

	<style>
		:root {
			--ck-z-default: 100;
		}

		html,
		body {
			height: 100%;
		}

		#info {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translateX(-50%);
			display: none;
		}
	</style>
</div>
