<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>1</title>
		<script type="module" src="./1.ts"></script>
	</head>
	<body>
		<ck-manual-header>
			<h2>
				The supportAllValues doesn't work with nested elements
				<a href="https://github.com/ckeditor/ckeditor5/issues/8233">#8233</a>
			</h2>
			<ol>
				<li>
					Open CKEditor Inspector (if not already opened) and go to <code>View</code> tab.
				</li>
			</ol>
			<p>
				<strong>Expected result</strong>: the <code>&#x3C;span></code> element has both
				<code>font-family</code> <strong>and</strong> <code>font-size</code> styles.
			</p>
			<p>
				<strong>Unexpected result</strong>: the <code>&#x3C;span></code> element lost nested
				<code>font-size</code> style.
			</p>
		</ck-manual-header>

		<div id="editor">
			<p>
				<span
					style="
						font-family:
							&quot;Lucida Sans Unicode&quot;, &quot;Lucida Grande&quot;, sans-serif;
					"
					><span style="font-size: 28px">LUCIDA, 28px</span></span
				>
			</p>
		</div>
	</body>
</html>
