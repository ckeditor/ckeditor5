<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Tablenonesting</title>
		<script type="module" src="./tablenonesting.ts"></script>
	</head>
	<body>
		<ck-manual-header>
			<ul>
				<li>
					The nested table present in the data should be "unnested" on data load. Its
					content should be inlined in the outermost table.
				</li>
				<li>
					It should not be possible to insert a table into a table in any way (UI, paste,
					d&#x26;d, etc.).
				</li>
			</ul>
		</ck-manual-header>

		<style>
			body {
				font-family: Helvetica, Arial, sans-serif;
				font-size: 14px;
			}
		</style>

		<div id="editor">
			<p>Nested tables (in the data):</p>

			<figure class="table">
				<table>
					<tr>
						<td>&nbsp;</td>
						<td>&nbsp;</td>
						<td>&nbsp;</td>
					</tr>
					<tr>
						<td>&nbsp;</td>
						<td>
							<p>Paragraph before table</p>
							<figure class="table">
								<table>
									<tr>
										<td>
											Nested table (that should be unnested on data load).
										</td>
									</tr>
								</table>
							</figure>
							<p>Paragraph after table</p>
						</td>
						<td>&nbsp;</td>
					</tr>
					<tr>
						<td>&nbsp;</td>
						<td>&nbsp;</td>
						<td>&nbsp;</td>
					</tr>
				</table>
			</figure>
		</div>
	</body>
</html>
