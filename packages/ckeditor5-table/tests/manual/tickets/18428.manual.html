<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>18428</title>
		<script type="module" src="./18428.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<h3>CSS table selector specificity regarding margins.</h3>
			<p>
				Every new table will contain a custom CSS class <code>ck-table-custom</code> that
				has a custom style:
			</p>
			<pre><code class="language-css">.ck-content .table.ck-table-custom {
	margin: 0 0 auto;
}
</code></pre>
			<p>It's not override by editor's styles.</p>
		</ck-manual-header>

		<div id="editor">
			<p></p>
			<figure class="table ck-table-custom">
				<table>
					<tbody>
						<tr>
							<td>1</td>
							<td>2</td>
							<td>3</td>
							<td>4</td>
						</tr>
						<tr>
							<td>5</td>
							<td>6</td>
							<td>7</td>
							<td>8</td>
						</tr>
						<tr>
							<td>9</td>
							<td>10</td>
							<td>11</td>
							<td>12</td>
						</tr>
					</tbody>
				</table>
			</figure>
			<p></p>
		</div>

		<style>
			.ck-content .table.ck-table-custom {
				margin: 0 0 auto;
			}
		</style>
	</body>
</html>
