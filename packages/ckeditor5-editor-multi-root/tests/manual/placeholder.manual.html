<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Placeholder</title>
		<script type="module" src="./placeholder.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<p>
				This test checks whether placeholder is correctly initialized for multi-root editor
				editables.
			</p>
			<p>The placeholder should be set on the first and on the last element.</p>
		</ck-manual-header>

		<p>
			<button id="destroyEditor">Destroy editor</button>
			<button id="initEditor">Init editor</button>
		</p>

		<h2>The toolbar</h2>
		<div class="toolbar-container"></div>

		<h2>The editable</h2>
		<div class="editable-container">
			<div id="editor-intro"></div>
			<div id="editor-content"></div>
			<div id="editor-outro"></div>
		</div>

		<style>
			.editable-container,
			.toolbar-container {
				position: relative;
				border: 1px solid red;
			}

			.editable-container::after,
			.toolbar-container::after {
				content: attr(class);
				position: absolute;
				background: red;
				color: #fff;
				top: 0;
				right: 0;
				font: 10px/2 monospace;
				padding: 0.1em 0.3em;
			}

			.toolbar-container {
				padding: 1em;
			}

			.editable-container {
				padding: 3em;
				overflow-y: scroll;
				max-height: 300px;
			}

			.editable-container .ck-editor__editable {
				padding: 2em;
				border: 1px #d3d3d3 solid;
				border-radius: var(--ck-border-radius);
				background: white;
				box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
			}
		</style>
	</body>
</html>
