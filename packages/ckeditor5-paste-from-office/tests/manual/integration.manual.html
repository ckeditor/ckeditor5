<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Integration</title>
		<script type="module" src="./integration.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<h2>Paste from Office</h2>
			<p>Simple test for Paste from Word.</p>
			<p>Check:</p>
			<ol>
				<li>Copy &#x26; paste some content from Word.</li>
			</ol>
		</ck-manual-header>

		<style>
			.clipboard-title {
				font-size: 1em;
			}
		</style>
		<div id="editor">
			<h2>Paste here:</h2>

			<p></p>

			<p>or <strong>here:</strong></p>

			<ul>
				<li>
					Maybe <a href="https://github.com/ckeditor/ckeditor5">somewhere <i>here</i>?</a>
				</li>
			</ul>
		</div>

		<h2 class="clipboard-title">Clipboard HTML</h2>
		<div
			id="html"
			contenteditable="true"
			style="width: 100%; height: 300px; background-color: #eee; overflow: auto"
		></div>

		<h2 class="clipboard-title">Clipboard text</h2>
		<div
			id="text"
			contenteditable="true"
			style="width: 100%; height: 100px; background-color: #ddd; overflow: auto"
		></div>

		<h2 class="clipboard-title">Clipboard normalized HTML view after transformation</h2>
		<div
			id="data"
			contenteditable="true"
			style="width: 100%; height: 100px; background-color: #ccc; overflow: auto"
		></div>

		<h2 class="clipboard-title">Clipboard RTF</h2>
		<div
			id="rtf"
			contenteditable="true"
			style="width: 100%; height: 100px; background-color: #ccc; overflow: auto"
		></div>
	</body>
</html>
