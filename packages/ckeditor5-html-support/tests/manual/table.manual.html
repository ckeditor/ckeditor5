<!doctype html>
<head>
	<meta charset="utf-8" />
	<title>Table</title>
	<meta
		http-equiv="Content-Security-Policy"
		content="script-src 'self' https://ckeditor.com 'unsafe-inline' 'unsafe-eval'"
	/>
	<script type="module" src="./table.js"></script>
</head>

<ck-manual-header>
	<h2>Table</h2>
	<p>Verify if every table structure element:</p>
	<ul>
		<li><code>figure</code></li>
		<li><code>table</code></li>
		<li><code>tbody</code></li>
		<li><code>thead</code></li>
		<li><code>caption</code></li>
		<li><code>figurecaption</code></li>
		<li><code>tr</code></li>
		<li><code>th</code></li>
		<li><code>td</code></li>
	</ul>
	<p>
		<strong>Case 1:</strong> Has its own <code>data-validation-allow</code> attribute and blue
		border.
	</p>
	<p>
		<strong>Case 2:</strong> Doesn't have <code>data-validation-disallow</code> attribute or red
		border.
	</p>
</ck-manual-header>

<style>
	[contenteditable="true"] [data-validation-allow] {
		border: 1px solid blue !important;
	}

	[contenteditable="true"] [data-validation-disallow] {
		border: 1px solid red !important;
	}
</style>

<div id="editor">
	<figure class="table">
		<table>
			<caption>
				caption
			</caption>
			<thead>
				<tr>
					<th>1</th>
					<th>2</th>
					<th>3</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>1.1</td>
					<td>1.2</td>
					<td>1.3</td>
				</tr>
				<tr>
					<td>2.1</td>
					<td>2.2</td>
					<td>2.3</td>
				</tr>
				<tr>
					<td>3.1</td>
					<td>3.2</td>
					<td>3.3</td>
				</tr>
			</tbody>
		</table>
	</figure>

	<figure class="table">
		<table>
			<thead>
				<tr>
					<th>1</th>
					<th>2</th>
					<th>3</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>1.1</td>
					<td>1.2</td>
					<td>1.3</td>
				</tr>
				<tr>
					<td>2.1</td>
					<td>2.2</td>
					<td>2.3</td>
				</tr>
				<tr>
					<td>3.1</td>
					<td>3.2</td>
					<td>3.3</td>
				</tr>
			</tbody>
		</table>
		<figcaption>figcaption</figcaption>
	</figure>
</div>
<script>
	document
		.getElementById("editor")
		.querySelectorAll("figure, table, caption, figcaption, tbody, thead, tr, th, td")
		.forEach((node) => {
			node.setAttribute("data-validation-allow", true);
			node.setAttribute("data-validation-disallow", true);
		});
</script>
