<!doctype html>
<head>
	<meta charset="utf-8" />
	<title>Ghs Link</title>
	<meta
		http-equiv="Content-Security-Policy"
		content="script-src 'self' https://ckeditor.com 'unsafe-inline' 'unsafe-eval'"
	/>
	<style>
		.link {
			display: inline-block;
			padding: 1em;
			outline: 1px solid rgba(255, 0, 0, 0.3);
		}
	</style>
	<script type="module" src="./ghs-link.ts"></script>
</head>

<ck-manual-header>
	<h2>GHS Link handling</h2>
</ck-manual-header>

<div id="editor">
	<p>foo <a href="#bar" class="link">bar</a></p>
	<p>foo <a href="#bar" class="link">bar</a> baz</p>
	<p><a href="#bar" class="link">bar</a> baz</p>
	<p><a href="#bar" class="link">bar</a></p>
	<p><a href="#foo" class="link">foo</a><a href="#bar" class="link">bar</a></p>
</div>
