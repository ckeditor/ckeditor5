<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Ghs Template Element</title>
		<script type="module" src="./ghs-template-element.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<h2>GHS <code>&#x3C;template></code> element support</h2>
		</ck-manual-header>

		<div id="editor">
			<h2>The <code>&lt;template&gt;</code> element</h2>
			<p>As block:</p>
			<template id="test1">
				aa
				<h2>Hi</h2>
				bb
			</template>
			<p>
				In paragraph: <template id="test2"> aa <b> Hi </b> bb </template>
			</p>
			<div>
				In container:
				<template id="test3">
					aa
					<h3>Hi</h3>
					bb
				</template>
			</div>
			<p>
				Other custom element: <foo-bar class="abc"> aa <i> Hi </i> bb </foo-bar>
			</p>
		</div>
	</body>
</html>
