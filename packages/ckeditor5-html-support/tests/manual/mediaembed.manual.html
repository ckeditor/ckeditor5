<!doctype html>
<head>
	<meta charset="utf-8" />
	<title>Mediaembed</title>
	<meta
		name="x-cke-crawler-ignore-patterns"
		content='{
		"console-error": [ "<svg> attribute preserveAspectRatio", "transparent NaN" ]
	}'
	/>
	<script type="module" src="./mediaembed.js"></script>
</head>

<ck-manual-header>
	<h2>Media Embed</h2>
	<p>
		Compare the output (using e.g. Source Editing plugin) with the expected result below the
		editor.
	</p>
</ck-manual-header>

<div style="display: flex; justify-content: space-between">
	<div style="flex: 0 1 49%">
		<h4>The default <code>oembed</code> element</h4>

		<div id="editor">
			<figure
				class="media allowed-class disallowed-class"
				data-validation-allow="Allowed attribute"
				data-validation-disallow="Disallowed attribute"
				style="color: blue"
			>
				<oembed
					class="allowed-class disallowed-class"
					url="https://www.youtube.com/watch?v=ZVv7UMQPEWk"
					data-validation-allow="Allowed attribute"
					data-validation-disallow="Disallowed attribute"
					style="color: blue"
				></oembed>
			</figure>
		</div>

		<h4>Expected output</h4>

		<textarea style="width: 100%; height: 200px; line-height: 1.8em">
<figure class="media allowed-class" style="color:blue;" data-validation-allow="Allowed attribute">
    <oembed class="allowed-class" style="color:blue;" url="https://www.youtube.com/watch?v=ZVv7UMQPEWk" data-validation-allow="Allowed attribute"></oembed>
</figure>
		</textarea
		>
	</div>
	<div style="flex: 0 1 49%">
		<h4>Custom media element</h4>

		<div id="editor-custom-element-name">
			<figure
				class="media allowed-class disallowed-class"
				data-validation-allow="Allowed attribute"
				data-validation-disallow="Disallowed attribute"
				style="color: blue"
			>
				<custom-oembed
					class="allowed-class disallowed-class"
					url="https://vimeo.com/1084537"
					data-validation-allow="Allowed attribute"
					data-validation-disallow="Disallowed attribute"
					style="color: blue"
				></custom-oembed>
			</figure>
		</div>

		<h4>Expected output</h4>

		<textarea style="width: 100%; height: 200px; line-height: 1.8em">
<figure class="media allowed-class" style="color:blue;" data-validation-allow="Allowed attribute">
    <custom-oembed class="allowed-class" style="color:blue;" url="https://vimeo.com/1084537" data-validation-allow="Allowed attribute"></custom-oembed>
</figure>
		</textarea
		>
	</div>
</div>
