<div class="options-container">
	<input id="chbx-show-borders" type="checkbox" />
	<label for="chbx-show-borders">Show borders</label>
</div>

<div id="editor">
	<ul data-main="list" style="background-color: yellow">
		<li data-main="item" style="background-color: pink">
			<p data-node="p1">foo</p>
			<p data-node="p2">bar</p>
			<ol data-nested="list" style="background-color: orange">
				<li data-nested="item" style="background-color: red">x</li>
				<li data-nested="item2" style="background-color: red">y</li>
			</ol>
		</li>
	</ul>
</div>

<style>
	.show-borders ul, .show-borders ol {
		border: 2px dashed blue;
		padding-top: 5px;
		padding-bottom: 5px;
		margin: 5px;
	}

	.show-borders li {
		border: 2px dotted red;
		padding: 5px;
		margin: 5px;
	}

	.options-container {
		margin-bottom: 16px;
	}
</style>

<script type="module">
/**
 * @license Copyright (c) 2003-2026, CKSource Holding sp. z o.o. All rights reserved.
 * For licensing, see LICENSE.md or https://ckeditor.com/legal/ckeditor-licensing-options
 */

import { ClassicEditor } from '@ckeditor/ckeditor5-editor-classic';
import { Essentials } from '@ckeditor/ckeditor5-essentials';
import { Paragraph } from '@ckeditor/ckeditor5-paragraph';
import { Bold, Italic, Strikethrough } from '@ckeditor/ckeditor5-basic-styles';
import { ListProperties } from '@ckeditor/ckeditor5-list';
import { SourceEditing } from '@ckeditor/ckeditor5-source-editing';
import { Indent } from '@ckeditor/ckeditor5-indent';

import { GeneralHtmlSupport } from '../../src/generalhtmlsupport.js';

ClassicEditor
	.create( {
		attachTo: document.querySelector( '#editor' ),
		plugins: [
			Bold,
			ListProperties,
			Essentials,
			Italic,
			Paragraph,
			Strikethrough,
			Indent,
			SourceEditing,
			GeneralHtmlSupport
		],
		toolbar: [
			'sourceEditing', '|',
			'numberedList', 'bulletedList', '|',
			'outdent', 'indent', '|',
			'bold', 'italic', 'strikethrough'
		],
		list: {
			properties: {
				styles: true,
				startIndex: true,
				reversed: true
			}
		},
		htmlSupport: {
			allow: [
				{
					name: /^.*$/,
					styles: true,
					attributes: true,
					classes: true
				}
			]
		}
	} )
	.then( editor => {
		window.editor = editor;
	} )
	.catch( err => {
		console.error( err.stack );
	} );

document.getElementById( 'chbx-show-borders' ).addEventListener( 'change', () => {
	document.body.classList.toggle( 'show-borders' );
} );
</script>
