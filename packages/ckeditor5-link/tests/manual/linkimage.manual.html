<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Linkimage</title>
		<script type="module" src="./linkimage.js"></script>
	</head>
	<body>
		<ck-manual-header>
			<h1>Linking Image</h1>
			<p>Only the first image should have:</p>
			<ul>
				<li>defined the <code>linkHref</code> attribute.</li>
				<li>
					the linked image icon indicator in the top-right corner (the element should be
					placed inside the <code>&#x3C;a></code> element).
				</li>
			</ul>
		</ck-manual-header>

		<div id="editor">
			<h2>Inline playground</h2>
			<p>
				Inline images that
				<a href="http://ckeditor.com"
					>are <img src="sample50.png" alt="Linked inline image" /> both
					<img src="sample50.png" alt="Another linked inline image" /> linked</a
				>
				and not <img src="sample50.png" alt="Unlinked inline image" /> linked.
			</p>

			<h2>Block playground</h2>

			<figure class="table">
				<table>
					<thead>
						<tr>
							<th colspan="2" rowspan="2">&nbsp;</th>
							<th>Linked</th>
							<th>&nbsp;</th>
						</tr>
						<tr>
							<th>yes</th>
							<th>no</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<th rowspan="2">Captioned</th>
							<th>yes</th>
							<td>
								<figure class="image">
									<a href="http://ckeditor.com">
										<img src="sample.jpg" alt="Linked captioned block image" />
									</a>
									<figcaption>Linked captioned block image</figcaption>
								</figure>
							</td>
							<td>
								<figure class="image">
									<img src="sample.jpg" alt="Unlinked captioned block image" />
									<figcaption>&nbsp;Captioned block image</figcaption>
								</figure>
							</td>
						</tr>
						<tr>
							<th>no</th>
							<td>
								<figure class="image">
									<a href="http://ckeditor.com">
										<img src="sample.jpg" alt="Linked block image" />
									</a>
								</figure>
							</td>
							<td>
								<figure class="image">
									<img src="sample.jpg" alt="Unlinked block image" />
								</figure>
							</td>
						</tr>
					</tbody>
				</table>
			</figure>
		</div>
	</body>
</html>
